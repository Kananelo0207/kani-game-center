<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../background.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HitBack</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="stars"></div>
    <div class="grain"></div>
  </div>

  <div class="glow" aria-hidden="true"></div>

  <main class="game-page">
    <h1>HitBack 🏓</h1>

    <section class="setup-panel">
      <input id="player1Name" type="text" placeholder="Player 1 name" maxlength="16" />
      <input id="player2Name" type="text" placeholder="Player 2 / Computer name" maxlength="16" />

      <select id="gameMode">
        <option value="single">Single Player</option>
        <option value="multi">Multiplayer</option>
      </select>

      <select id="roundSelector">
        <option value="3">First to 3</option>
        <option value="5" selected>First to 5</option>
        <option value="7">First to 7</option>
      </select>

      <button id="startBtn" type="button">Start Game</button>
      <button id="restartBtn" type="button">Restart</button>
      <a class="back-btn" href="../index.html">← Back</a>
    </section>

    <div class="game-info">
      <span id="modeLabel">Single Player</span> • First to
      <span id="targetScore">5</span>
    </div>

    <div class="controls-info" id="controlsInfo">
      Controls: Mouse / touch drag
    </div>

    <section class="stage-wrap">
      <canvas id="game" width="960" height="540" aria-label="HitBack game canvas"></canvas>

      <div class="mobile-controls" aria-label="Mobile paddle controls">
        <button type="button" data-action="up">⬆ Up</button>
        <button type="button" data-action="down">⬇ Down</button>
      </div>
    </section>

    <div class="winner-message" id="winnerMessage"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
