<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../background.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pac-Man</title>

  <link rel="stylesheet" href="../style.css" />

  <style>
    body
    {
      touch-action: manipulation;
    }

    .pacman-wrap
    {
      display: grid;
      gap: 14px;
    }

    .hud
    {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .hud-card
    {
      flex: 1;
      min-width: 240px;
      margin: 0;
    }

    .row
    {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row.center-mobile
    {
      justify-content: flex-start;
    }

    .stage
    {
      position: relative;
      display: grid;
      place-items: center;
      gap: 14px;
      overflow: hidden;
    }

    canvas
    {
      width: min(720px, 96vw);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: #000;
      display: block;
      touch-action: none;
    }

    .overlay
    {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 14px;
      background: rgba(0,0,0,.55);
      border-radius: 16px;
      z-index: 2;
      padding: 16px;
      text-align: center;
      pointer-events: auto; 
    }

    .overlay h2
    {
      margin: 0;
      font-family: Consolas, monospace;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 16px;
      white-space: pre-line;
    }
    
    .overlay button
    {
      min-width: 120px;
      padding: 12px 18px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.12);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .mobile-controls
    {
      display: none;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      width: 100%;
      z-index: 5;
      position: relative;
    }

    .middle-row
    {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .mobile-controls button
    {
      width: 64px;
      height: 64px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 1.35rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mobile-controls button:active
    {
      transform: scale(.96);
    }

    .kbd
    {
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      color: var(--muted);
    }

    .game-hint
    {
      text-align: center;
    }

    @media (max-width: 768px)
    {
      .hud
      {
        flex-direction: column;
        align-items: stretch;
      }

      .row.center-mobile
      {
        justify-content: center;
      }

      .hud-card
      {
        min-width: 100%;
      }

      canvas
      {
        width: min(94vw, 560px);
      }

      .mobile-controls
      {
        display: flex;
      }

      .overlay h2
      {
        font-size: 1rem;
      }
    }

    @media (max-width: 520px)
    {
      .pagehead h1
      {
        font-size: 1.8rem;
        text-align: center;
      }

      .row
      {
        justify-content: center;
      }

      canvas
      {
        width: min(92vw, 420px);
      }

      .mobile-controls button
      {
        width: 58px;
        height: 58px;
        font-size: 1.15rem;
      }

      .game-hint
      {
        font-size: .95rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="stars"></div>
    <div class="grain"></div>
  </div>

  <div class="glow" aria-hidden="true"></div>

  <main class="wrap pacman-wrap">
    <header class="pagehead">
      <h1>Pac-Man 👾</h1>
    </header>

    <section class="hud">
      <div class="card hud-card">
        <div class="row">
          <strong id="scoreLabel">Score: 0</strong>
          <strong id="livesLabel">Lives: 3</strong>
        </div>

        <div class="muted" id="statusLine">
          Press space or tap controls to start
        </div>
      </div>

      <div class="row center-mobile">
        <button id="restartBtn" type="button">Restart</button>
        <a class="btn ghost" href="../index.html" style="color: white;">← Back</a>
      </div>
    </section>

    <section class="card stage">
      <canvas id="game" width="600" height="600" aria-label="Pac-Man game canvas"></canvas>

      <div id="overlay" class="overlay">
        <h2 id="overlayText">PRESS SPACE OR TAP START</h2>
        <button id="startBtn" type="button">Start</button>
      </div>

      <div class="mobile-controls" aria-label="Mobile Pac-Man controls">
        <button type="button" data-dir="up">⬆</button>

        <div class="middle-row">
          <button type="button" data-dir="left">⬅</button>
          <button type="button" data-dir="down">⬇</button>
          <button type="button" data-dir="right">➡</button>
        </div>
      </div>

      <div class="muted game-hint">
        <span class="kbd">Arrow keys</span>
        <span class="kbd">Swipe on canvas</span>
        <span class="kbd">Touch controls on mobile</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
