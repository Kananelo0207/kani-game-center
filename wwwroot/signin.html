<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Game Center</title>
  <link rel="stylesheet" href="background.css" />
  <link rel="stylesheet" href="style.css" />
  
  <style>
    .signin-box {
      max-width: 420px;
      margin: 100px auto;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }

    .signin-box h1 { margin-bottom: 12px; font-size: 36px; }
    .signin-box p { color: #b9c2d0; margin-bottom: 20px; }

    .signin-box input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .signin-btn {
      display: inline-block;
      width: 100%;
      border: none;
      cursor: pointer;
      color: #0b1020;
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      transition: transform .18s ease;
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
    }

    .signin-btn:hover { transform: translateY(-1px); }
    .error { margin-top: 12px; color: #fda4af; font-size: 14px; min-height: 20px; }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="glow" aria-hidden="true"></div>

  <main class="wrap">
    <div class="signin-box">
      <h1>🎮 Sign In</h1>
      <p>Enter your player credentials to continue.</p>

      <input type="text" id="playerName" placeholder="Enter Player Name" />
      <input type="password" id="playerPassword" placeholder="Enter Password" />
      
      <button class="signin-btn" onclick="signIn()">Enter Game Center</button>

      <div class="error" id="errorMessage"></div>
    </div>
  </main>

  <script>
    document.addEventListener("mousemove", (e) => {
      document.documentElement.style.setProperty("--mx", (e.clientX / window.innerWidth) * 100 + "%");
      document.documentElement.style.setProperty("--my", (e.clientY / window.innerHeight) * 100 + "%");
    });

    async function signIn() {
      const name = document.getElementById("playerName").value.trim();
      const password = document.getElementById("playerPassword").value.trim();
      const errorMsg = document.getElementById("errorMessage");

      if (!name || !password) {
        errorMsg.textContent = "Please enter both name and password.";
        return;
      }

      try {
        // FIXED URL TO RELATIVE PATH
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem("jwt_token", data.token);
          localStorage.setItem("playerName", name);
          window.location.href = "index.html";
        } else {
          errorMsg.textContent = "wrong password chief";
        }
      } catch (err) {
        errorMsg.textContent = "wrong password chief";
      }
    }
  </script>
</body>
</html>
