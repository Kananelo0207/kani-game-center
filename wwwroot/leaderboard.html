<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Global Leaderboard</title>
        <style>
            :root {
                --bg-dark: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.7);
                --accent: #8b5cf6;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
            }

            body {
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
                color: var(--text-main);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .header {
                margin-top: 40px;
                text-align: center;
            }

            .header h1 {
                font-size: 3rem;
                margin: 0;
                background: linear-gradient(to right, #a78bfa, #c084fc);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .header p {
                color: var(--text-muted);
                font-size: 1.1rem;
            }

            .leaderboard-container {
                margin-top: 30px;
                width: 90%;
                max-width: 600px;
                background: var(--card-bg);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }

            th, td {
                padding: 15px;
                text-align: left;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            th {
                color: var(--text-muted);
                text-transform: uppercase;
                font-size: 0.85rem;
                letter-spacing: 1px;
            }

            tr:last-child td {
                border-bottom: none;
            }

            .rank {
                font-weight: bold;
                color: var(--accent);
                width: 50px;
            }

            .score {
                font-weight: bold;
                text-align: right;
                color: #10b981; 
            }

            tr:nth-child(1) .rank { color: #fbbf24; font-size: 1.2rem; }
            tr:nth-child(2) .rank { color: #94a3b8; font-size: 1.1rem; }
            tr:nth-child(3) .rank { color: #b45309; font-size: 1.1rem; }

            .btn-back {
                margin-top: 30px;
                padding: 12px 24px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                text-decoration: none;
                border-radius: 8px;
                transition: all 0.2s ease;
                font-weight: bold;
            }

            .btn-back:hover {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }

            #loading {
                text-align: center;
                color: var(--text-muted);
                padding: 20px;
            }
        </style>
    </head>
    <body>

        <div class="header">
            <h1>Hall of Fame</h1>
            <p>Global Arcade Rankings</p>
        </div>

        <div class="leaderboard-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th style="text-align: right;">Total Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr id="loading">
                        <td colspan="3" style="text-align:center;">Fetching scores from the cloud...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="index.html" class="btn-back">← Back to Game Center</a>

        <script>
            async function loadLeaderboard() {
                const tableBody = document.getElementById('leaderboardBody');
                
                try {
                    // FIXED URL TO RELATIVE PATH
                    const response = await fetch('/api/game/leaderboard');
                    
                    if (!response.ok) {
                        throw new Error('Failed to fetch scores');
                    }

                    const data = await response.json();
                    tableBody.innerHTML = ''; 

                    if (data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No scores yet. Go play some games!</td></tr>';
                        return;
                    }

                    data.forEach((player, index) => {
                        const row = document.createElement('tr');
                        
                        let rankDisplay = `#${index + 1}`;
                        if (index === 0) rankDisplay = '👑 1';

                        row.innerHTML = `
                            <td class="rank">${rankDisplay}</td>
                            <td class="name">${player.playerName}</td>
                            <td class="score">${player.totalPoints.toLocaleString()}</td>
                        `;
                        tableBody.appendChild(row);
                    });

                } catch (error) {
                    console.error("Leaderboard Error:", error);
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #ef4444;">Could not load leaderboard. Server might be down.</td></tr>';
                }
            }

            window.onload = loadLeaderboard;
        </script>
    </body>
</html>
