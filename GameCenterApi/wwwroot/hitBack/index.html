<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../background.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HitBack</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="stars"></div>
    <div class="grain"></div>
  </div>

  <div class="glow" aria-hidden="true"></div>

  <main class="game-page">
    <h1>HitBack 🏓</h1>

    <section class="setup-panel">
      <input id="player1Name" type="text" placeholder="Player 1 name" maxlength="16" />
      <input id="player2Name" type="text" placeholder="Player 2 / Computer name" maxlength="16" />

      <select id="gameMode">
        <option value="ranked" style="color: black;" selected>1 Player (Ranked - Global)</option>
        <option value="single" style="color: black;">Single Player vs CPU</option>
        <option value="multi" style="color: black;">Multiplayer (Local)</option>
      </select>

      <select id="roundSelector">
        <option value="3" style="color: black;">First to 3</option>
        <option value="5" style="color: black;" selected>First to 5</option>
        <option value="7" style="color: black;">First to 7</option>
      </select>

      <button id="startBtn" type="button">Start Game</button>
      <button id="restartBtn" type="button">Restart</button>
      <a class="back-btn" href="../index.html">← Back</a>
    </section>

    <div class="game-info">
      <span id="modeLabel">Endless Rally (Ranked)</span> <span id="targetContainer">• First to <span id="targetScore">5</span></span>
    </div>

    <div class="controls-info" id="controlsInfo">
      Controls: Mouse / touch drag
    </div>

    <section class="stage-wrap">
      <canvas id="game" width="960" height="540" aria-label="HitBack game canvas"></canvas>

      <div class="mobile-controls" aria-label="Mobile paddle controls">
        <button type="button" data-action="up">⬆ Up</button>
        <button type="button" data-action="down">⬇ Down</button>
      </div>
    </section>

    <div class="winner-message" id="winnerMessage" style="white-space: pre-line;"></div>

    <section class="setup-panel" style="text-align: center; border: 1px solid #8b5cf6; background: rgba(139, 92, 246, 0.05); margin-top: 20px; display: block;">
      <h2 style="color: #a855f7; font-size: 1.1rem; margin-bottom: 5px; margin-top: 0;">🌐 Global Rankings</h2>
      <a href="../leaderboard.html" style="color: #cbd5e1; text-decoration: underline; font-size: 0.9rem;">
          View Top 200 Players
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
