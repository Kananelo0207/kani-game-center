<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Kani">
    <title>Snake Game Hub | Kani's Game Center</title>

    <link rel="stylesheet" href="../background.css">
    <link rel="stylesheet" href="../style.css" />

    <style>
        /* Container Layout */
        .snake-wrap {
            display: grid;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* HUD Styling */
        .hud {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
        }

        .hud-card {
            flex: 1;
            min-width: 240px;
            margin: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Game Stage */
        .stage {
            position: relative;
            display: grid;
            place-items: center;
            gap: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: min(720px, 96vw);
            max-width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            background: #050505;
            display: block;
            touch-action: none;
        }

        /* Mode Selection Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            align-content: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            z-index: 10;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .overlay h2 {
            margin: 0;
            font-family: 'Consolas', monospace;
            color: white;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .mode-btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 280px;
        }

        .overlay button {
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .overlay button:hover {
            transform: translateY(-3px);
            filter: brightness(1.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-single {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-multi {
            background: linear-gradient(135deg, #3b82f6, #2dd4bf);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        /* Leaderboard & Controls */
        .leader {
            white-space: pre-line;
            line-height: 1.8;
            font-family: 'Consolas', monospace;
            color: #a1a1aa;
        }

        .mobile-controls {
            display: none;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            margin-top: 15px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>
    <div class="glow" aria-hidden="true"></div>

    <main class="wrap snake-wrap">
        <header class="pagehead">
            <h1 style="text-align: center;">Snake</h1>
        </header>

        <section class="hud" aria-label="Game Stats">
            <div class="card hud-card">
                <div class="row">
                    <strong id="currentPlayer">Waiting for selection...</strong>
                </div>
                <div class="muted" id="scoreLine">0 Points</div>
            </div>
            
            <div class="row">
                <button id="restartBtn" type="button" class="btn">Reset Game</button>
                <a class="btn ghost" href="../index.html" style="color: white; text-decoration: none;">← Exit to Hub</a>
            </div>
        </section>

        <section class="card stage">
            <canvas id="game" width="600" height="600" aria-label="Snake Game Area"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="overlayText">Select Mode</h2>
                <div class="mode-btn-container">
                    <button id="startSingleBtn" class="btn-single">1 Player (Ranked)</button>
                    <button id="startMultiBtn" class="btn-multi">2 Player (Local)</button>
                </div>
            </div>

            <div class="mobile-controls" aria-hidden="true">
                <button type="button" data-dir="up">⬆</button>
                <div style="display: flex; gap: 10px;">
                    <button type="button" data-dir="left">⬅</button>
                    <button type="button" data-dir="down">⬇</button>
                    <button type="button" data-dir="right">➡</button>
                </div>
            </div>
        </section>

        <section class="card" style="text-align: center; border: 1px solid #8b5cf6; background: rgba(139, 92, 246, 0.05);">
            <h2 style="color: #a855f7; font-size: 1.1rem; margin-bottom: 10px;">Scoreboard</h2>
            <a href="../leaderboard.html" class="btn-single" style="display: 
                inline-block; text-decoration: none; padding: 10px 20px; font-size: 0.9rem;">
                View All Rankings
            </a>
        </section>

        <section class="card">
            <h2 style="font-size: 1.2rem; margin-bottom: 15px;">Local High Scores</h2>
            <div class="leader muted" id="leaderboard">No local sessions recorded.</div>
        </section>
    </main>

    <script src="snake.js"></script>
</body>
</html>
