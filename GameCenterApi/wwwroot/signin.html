<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Game Center</title>
  <link rel="stylesheet" href="background.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="glow" aria-hidden="true"></div>

  <main class="wrap">
    <div class="auth-box">
      <h1>Sign In</h1>
      <p>Enter your player credentials to continue.</p>

      <input type="text" id="playerName" placeholder="Enter Player Name" />
      <input type="password" id="playerPassword" placeholder="Enter Password" />
      
      <button class="auth-btn" onclick="signIn()">Enter Game Center</button>
      
      <div class="error-msg" id="errorMessage"></div>

      <p style="font-size: 14px;">First time playing? <br><br> <a class="auth-link" href="register.html">Create an Account Here</a></p>
    </div>
  </main>

  <script>
    let ticking = false;
    document.addEventListener("mousemove", (e) => {
      if (!ticking) {
        window.requestAnimationFrame(() => {
          document.documentElement.style.setProperty("--mx", (e.clientX / window.innerWidth) * 100 + "%");
          document.documentElement.style.setProperty("--my", (e.clientY / window.innerHeight) * 100 + "%");
          ticking = false;
        });
        ticking = true;
      }
    });

    async function signIn() {
      const name = document.getElementById("playerName").value.trim();
      const password = document.getElementById("playerPassword").value.trim();
      const errorMsg = document.getElementById("errorMessage");

      errorMsg.textContent = ""; 

      if (!name || !password) {
        errorMsg.textContent = "Please enter both name and password.";
        return;
      }

      try {
        const response = await fetch('https://kani-game-center-api.onrender.com/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ Name: name, Password: password })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem("jwt_token", data.token);
          localStorage.setItem("playerName", name);
          
          window.location.href = "index.html"; 
        } 
        else {
          const errorDetail = await response.text();
          errorMsg.textContent = errorDetail || "Invalid login. Check your name or password.";
        }
      } catch (err) {
        errorMsg.textContent = "Cannot connect to the server. Check your connection.";
        console.error(err);
      }
    }
</script>
</body>
</html>
