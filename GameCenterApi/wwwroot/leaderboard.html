<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Global Leaderboard</title>
        <style>
            :root {
                --bg-dark: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.7);
                --accent: #8b5cf6;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
            }

            body {
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
                color: var(--text-main);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .header {
                margin-top: 40px;
                text-align: center;
            }

            .header h1 {
                font-size: 3rem;
                margin: 0;
                background: linear-gradient(to right, #a78bfa, #c084fc);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .header p {
                color: var(--text-muted);
                font-size: 1.1rem;
            }

            .leaderboard-container {
                margin-top: 30px;
                width: 95%; 
                max-width: 700px;
                background: var(--card-bg);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 0; 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                overflow: hidden; 
            }

            .table-wrapper {
                max-height: 550px; 
                overflow-y: auto;
                padding: 0 20px 20px 20px;
            }

            .table-wrapper::-webkit-scrollbar {
                width: 8px;
            }
            .table-wrapper::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.05);
            }
            .table-wrapper::-webkit-scrollbar-thumb {
                background: var(--accent);
                border-radius: 10px;
            }
            .table-wrapper::-webkit-scrollbar-thumb:hover {
                background: #a78bfa;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            th {
                position: sticky;
                top: 0;
                background: #1e293b; 
                z-index: 5;
                padding: 20px 15px;
                color: var(--text-muted);
                text-transform: uppercase;
                font-size: 0.85rem;
                letter-spacing: 1px;
                text-align: left;
                border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            }

            td {
                padding: 15px;
                text-align: left;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            tr:last-child td {
                border-bottom: none;
            }

            .rank {
                font-weight: bold;
                color: var(--accent);
                width: 60px;
            }

            .score {
                font-weight: bold;
                text-align: right;
                color: #10b981; 
            }

            tr:nth-child(1) .rank { color: #fbbf24; font-size: 1.25rem; } 
            tr:nth-child(2) .rank { color: #cbd5e1; font-size: 1.15rem; } 
            tr:nth-child(3) .rank { color: #d97706; font-size: 1.15rem; } 

            tr:hover td {
                background: rgba(255, 255, 255, 0.03);
                transition: background 0.2s ease;
            }

            .btn-back {
                margin: 30px 0;
                padding: 12px 24px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                text-decoration: none;
                border-radius: 8px;
                transition: all 0.2s ease;
                font-weight: bold;
            }

            .btn-back:hover {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }

            #loading {
                text-align: center;
                color: var(--text-muted);
                padding: 40px;
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0% { opacity: 0.5; }
                50% { opacity: 1; }
                100% { opacity: 0.5; }
            }
    </style>
    </head>
    <body>

        <div class="header">
            <h1>Scoreboard</h1>
            <p>Global Arcade Rankings</p>
            <p id="lastUpdated" style="font-size: 0.85rem; opacity: 0.7; margin-top: 5px;">
            Checking for latest scores...</p>
        </div>

        <div class="leaderboard-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th style="text-align: right;">Total Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr id="loading">
                        <td colspan="3">Fetching scores from the cloud...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="index.html" class="btn-back">← Back to Game Center</a>

        <script>
            async function loadLeaderboard() {
                const tableBody = document.getElementById('leaderboardBody');
                
                try {
                    const response = await fetch('https://kani-game-center-api.onrender.com/api/game/leaderboard');

                    if (!response.ok) {
                        throw new Error('Failed to fetch scores');
                    }

                    const data = await response.json();
                    tableBody.innerHTML = ''; 

                    if (!data || data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No scores yet. Go play some games!</td></tr>';
                        return;
                    }

                    data.forEach((player, index) => {
                        const row = document.createElement('tr');
                        
                        let rankDisplay = `#${index + 1}`;
                        if (index === 0) rankDisplay = '1';

                        const name = player.playerName || player.PlayerName || "Unknown";
                        const points = player.totalPoints !== undefined ? player.totalPoints : (player.TotalPoints || 0);

                        row.innerHTML = `
                            <td class="rank">${rankDisplay}</td>
                            <td class="name">${name}</td>
                            <td class="score">${points.toLocaleString()}</td>
                        `;
                        tableBody.appendChild(row);
                    });

                    const now = new Date();
                    const statusEl = document.getElementById('lastUpdated');
                    if (statusEl) {
                        statusEl.textContent = `Last Updated: ${now.toLocaleDateString()} at ${now.toLocaleTimeString()}`;
                    }

                } catch (error) {
                    console.error("Leaderboard Error:", error);
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #ef4444;">Could not load leaderboard. Server might be down.</td></tr>';
                    
                    const statusEl = document.getElementById('lastUpdated');
                    if (statusEl) {
                        statusEl.textContent = "Offline - Connection Lost";
                    }
                }
            }

            window.onload = loadLeaderboard;
        </script>
    </body>
</html>
