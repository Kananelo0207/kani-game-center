<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Game Center</title>
    <link rel="stylesheet" href="background.css" />
    <link rel="stylesheet" href="style.css">

    <style>
        .signin-box {
          max-width: 420px;
          margin: 100px auto;
          padding: 30px;
          border: 1px solid rgba(255,255,255,0.12);
          border-radius: 24px;
          background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
          box-shadow: 0 18px 50px rgba(0,0,0,.35);
          backdrop-filter: blur(10px);
          position: relative;
          z-index: 1;
          text-align: center;
          color: white;
        }
    
        .signin-box h1 { margin-bottom: 12px; font-size: 36px; }
        .signin-box p { color: #b9c2d0; margin-bottom: 20px; }
    
        .signin-box input {
          width: 100%;
          padding: 14px;
          border-radius: 12px;
          border: 1px solid rgba(255,255,255,0.15);
          background: rgba(255,255,255,0.08);
          color: white;
          font-size: 16px;
          outline: none;
          margin-bottom: 16px;
          box-sizing: border-box;
        }
    
        .signin-btn {
          display: inline-block;
          width: 100%;
          border: none;
          cursor: pointer;
          color: white;
          background: #6c5ce7;
          padding: 12px 16px;
          border-radius: 12px;
          font-weight: 700;
          font-size: 16px;
          transition: transform .18s ease;
          box-shadow: 0 12px 28px rgba(0,0,0,.28);
          margin-bottom: 15px;
        }
    
        .signin-btn:hover { background: #a29bfe; transform: translateY(-1px); }
        .error { color: #fda4af; font-size: 14px; min-height: 20px; margin-bottom: 10px;}
        .reg-link { color: #a29bfe; text-decoration: none; transition: 0.2s;}
        .reg-link:hover { color: white; }
      </style>
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>
    
    <div class="glow" aria-hidden="true"></div>

    <main class="wrap">
        <div class="signin-box">
            <h1>Register</h1>
            <p>Create a new player profile.</p>

            <input type="text" id="reg-name" placeholder="Choose Username">
            <input type="password" id="reg-pass" minlength="6" placeholder="Password (Min 6 chars, 1 Upper, 1 Number, 1 Symbol)">
            
            <button class="signin-btn" onclick="register()">Create Account</button>
            <div class="error" id="errorMessage"></div>

            <p style="font-size: 14px;"><a class="reg-link" href="signin.html">← Back to Sign In</a></p>
        </div>
    </main>

    <script>
    document.addEventListener("mousemove", (e) => {
        document.documentElement.style.setProperty("--mx", (e.clientX / window.innerWidth) * 100 + "%");
        document.documentElement.style.setProperty("--my", (e.clientY / window.innerHeight) * 100 + "%");
    });

    async function register() {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        const errorMsg = document.getElementById("errorMessage");
        
        errorMsg.textContent = "";

        if (!name || !pass) {
            errorMsg.textContent = "Please enter both a name and password.";
            return;
        }

        try {
            const resp = await fetch('https://kani-game-center-api.onrender.com/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Name: name, Password: pass }) 
            });

            if (resp.ok) { 
                alert('Success! Your account is created.'); 
                window.location.href = 'signin.html'; 
            } 
            else { 
                const errorDetail = await resp.text();
                errorMsg.textContent = errorDetail || "Registration failed. Try a different name.";
            }
        } catch (err) {
            errorMsg.textContent = 'Cannot connect to server. Check your internet.';
        }
    }
</script>
</body>
</html>
