<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Game Center</title>
    <link rel="stylesheet" href="background.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>
    
    <div class="glow" aria-hidden="true"></div>

    <main class="wrap">
        <div class="auth-box">
            <h1>Register</h1>
            <p>Create a new player profile.</p>

            <input type="text" id="reg-name" placeholder="Choose Username">
            <input type="password" id="reg-pass" minlength="6" placeholder="Password (Min 6 chars, 1 Upper, 1 Number, 1 Symbol)">
            
            <button class="auth-btn register-btn" onclick="register()">Create Account</button>
            <div class="error-msg" id="errorMessage"></div>

            <p style="font-size: 14px;"><a class="auth-link" href="signin.html" style="font-weight: normal;">← Back to Sign In</a></p>
        </div>
    </main>

    <script>
    let ticking = false;
    document.addEventListener("mousemove", (e) => {
      if (!ticking) {
        window.requestAnimationFrame(() => {
          document.documentElement.style.setProperty("--mx", (e.clientX / window.innerWidth) * 100 + "%");
          document.documentElement.style.setProperty("--my", (e.clientY / window.innerHeight) * 100 + "%");
          ticking = false;
        });
        ticking = true;
      }
    });

    async function register() {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        const errorMsg = document.getElementById("errorMessage");
        
        errorMsg.textContent = "";

        if (!name || !pass) {
            errorMsg.textContent = "Please enter both a name and password.";
            return;
        }

        try {
            const resp = await fetch('https://kani-game-center-api.onrender.com/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Name: name, Password: pass }) 
            });

            if (resp.ok) { 
                alert('Success! Your account is created.'); 
                window.location.href = 'signin.html'; 
            } 
            else { 
                const errorDetail = await resp.text();
                errorMsg.textContent = errorDetail || "Registration failed. Try a different name.";
            }
        } catch (err) {
            errorMsg.textContent = 'Cannot connect to server. Check your internet.';
        }
    }
</script>
</body>
</html>
